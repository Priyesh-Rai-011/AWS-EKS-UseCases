apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels: 
    app: frontend-app
    # tier: 

spec:
  type: NodePort    # Loadbalancer if the proper one but if you are on the bare-metal --> use the NodePort
  selector:
    app: frontend-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080