apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp1-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp1-deployment
  template:
    metadata:
      labels:
        app: myapp1-pod
    spec:
      containers:
      - name: myapp1-container
        image: stacksimplify/kubenginx:1.0.0
        resources:
          request:
            memory: 256Mi
            cpu: 1000m
          limits:
            memory: 128Mi
            cpu: 500m
        ports:
        - containerPort: 80
