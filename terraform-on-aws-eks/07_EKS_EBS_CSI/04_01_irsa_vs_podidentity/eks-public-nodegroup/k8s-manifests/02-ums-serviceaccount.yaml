# ServiceAccount for ums-app pods.
# IRSA: the annotation below tells the token projector which IAM role to request.
# When a pod uses this SA, the kubelet mounts a short-lived OIDC token that AWS STS
# exchanges for temporary credentials for the annotated role.
# Get the role ARN from Terraform output: terraform output ums_app_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ums-app-sa
  namespace: ums-app
  labels:
    app: ums-app
  annotations:
    eks.amazonaws.com/role-arn: <REPLACE_WITH_ums_app_role_arn>
