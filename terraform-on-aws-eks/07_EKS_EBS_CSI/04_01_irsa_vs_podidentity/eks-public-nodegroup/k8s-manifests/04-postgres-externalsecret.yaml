# ESO fetches credentials from Secrets Manager and materializes them as a
# standard k8s Secret named "postgres-secret". The StatefulSet and UMS deployment
# reference that secret by name — same as before, but the values come from AWS, not git.
#
# Secret is created by Terraform (modules/secrets) using the cluster name as the key prefix:
#   eks-irsa-dev/ums/postgres
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-external-secret
  namespace: ums-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postgres-secret     # k8s Secret created/synced by ESO
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: eks-irsa-dev/ums/postgres
        property: POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: eks-irsa-dev/ums/postgres
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: eks-irsa-dev/ums/postgres
        property: POSTGRES_PASSWORD
