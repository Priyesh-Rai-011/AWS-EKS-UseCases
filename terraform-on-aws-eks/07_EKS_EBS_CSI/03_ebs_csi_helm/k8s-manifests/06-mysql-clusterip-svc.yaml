# Headless service — clusterIP: None is required by StatefulSet as its governing service.
# It gives each pod a stable DNS entry: mysql-0.mysql-svc.ums-app.svc.cluster.local
# The UMS app still connects to "mysql-svc:3306" and it resolves correctly.
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: ums-app
  labels:
    app: mysql
spec:
  type: ClusterIP
  clusterIP: None   # Headless — StatefulSet needs this to assign stable DNS per pod
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
