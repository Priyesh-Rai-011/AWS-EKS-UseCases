# StatefulSet instead of Deployment — MySQL is stateful, this is the right abstraction.
# Key wins: stable pod name (mysql-0), StatefulSet owns the PVC lifecycle via volumeClaimTemplates,
# and scaling to N replicas won't cause two pods to fight over the same EBS volume.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ums-app
  labels:
    app: mysql
spec:
  serviceName: mysql-svc   # Must point to the headless service in 06-mysql-clusterip-svc.yaml
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          envFrom:
            - secretRef:
                name: mysql-secret
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

  # StatefulSet provisions one PVC per replica automatically.
  # No separate 02-mysql-pvc.yaml needed — that file is now deleted.
  # If replicas ever scales to 2, mysql-0 gets mysql-data-mysql-0, mysql-1 gets mysql-data-mysql-1.
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-gp3-sc
        resources:
          requests:
            storage: 5Gi
