# DB credentials for the UMS stack — both MySQL init and the UMS app pull from here
# The UMS deployment cherry-picks MYSQL_USER and MYSQL_PASSWORD; MySQL pod gets all four
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: ums-app
  labels:
    app: mysql
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_DATABASE: umsdb
  MYSQL_USER: umsuser        # The app connects as this user, not root
  MYSQL_PASSWORD: umspassword
