# ── Local dev: connects to Postgres running in Docker Compose ──────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/umsdb
spring.datasource.username=umsuser
spring.datasource.password=umspassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.demo.ums=DEBUG
