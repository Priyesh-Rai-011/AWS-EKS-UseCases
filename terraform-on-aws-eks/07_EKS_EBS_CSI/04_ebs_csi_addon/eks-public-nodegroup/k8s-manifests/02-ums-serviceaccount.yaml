# ServiceAccount for ums-app pods.
# Pod Identity wired in Terraform (aws_eks_pod_identity_association) links this SA
# to the IAM role that can read from Secrets Manager — no annotation needed here. why? : 
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ums-app-sa
  namespace: ums-app
  labels:
    app: ums-app
