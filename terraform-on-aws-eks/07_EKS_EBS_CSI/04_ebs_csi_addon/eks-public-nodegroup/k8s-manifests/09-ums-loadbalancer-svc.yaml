apiVersion: v1
kind: Service
metadata:
  name: ums-loadbalancer-svc
  namespace: ums-app
  labels:
    app: ums-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: ums-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
