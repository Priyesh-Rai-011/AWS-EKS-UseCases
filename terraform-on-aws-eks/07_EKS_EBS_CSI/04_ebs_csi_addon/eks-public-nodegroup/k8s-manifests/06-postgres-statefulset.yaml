# StatefulSet — stable pod name (postgres-0), EBS volume auto-provisioned per replica
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ums-app
  labels:
    app: postgres
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret   # Created by ExternalSecret (04) from Secrets Manager
            - configMapRef:
                name: postgres-config
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: [pg_isready, -U, umsuser, -d, umsdb]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: [pg_isready, -U, umsuser, -d, umsdb]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-gp3-sc
        resources:
          requests:
            storage: 5Gi
