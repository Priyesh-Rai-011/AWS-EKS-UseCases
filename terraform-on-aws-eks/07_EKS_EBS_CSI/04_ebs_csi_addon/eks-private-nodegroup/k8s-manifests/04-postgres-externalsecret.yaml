# ESO fetches credentials from Secrets Manager and materializes them as a
# standard k8s Secret named "postgres-secret". The StatefulSet and UMS deployment
# reference that secret by name — same as before, but values come from AWS, not git.
#
# Create the AWS secret before deploying (run once from your local machine):
#   aws secretsmanager create-secret \
#     --name eks-private-dev/ums/postgres \
#     --region ap-south-1 \
#     --secret-string '{
#       "POSTGRES_DB":       "umsdb",
#       "POSTGRES_USER":     "umsuser",
#       "POSTGRES_PASSWORD": "<your-strong-password>"
#     }'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-external-secret
  namespace: ums-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_DB
      remoteRef:
        key: eks-private-dev/ums/postgres
        property: POSTGRES_DB
    - secretKey: POSTGRES_USER
      remoteRef:
        key: eks-private-dev/ums/postgres
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: eks-private-dev/ums/postgres
        property: POSTGRES_PASSWORD
