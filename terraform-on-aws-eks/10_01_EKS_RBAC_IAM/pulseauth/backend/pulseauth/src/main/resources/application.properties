spring.application.name=pulseauth

# PostgreSQL — env vars injected by docker-compose or K8s secret
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:pulseauth}
spring.datasource.username=${DB_USER:pulseadmin}
spring.datasource.password=${DB_PASSWORD:localpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Redis — env var injected by docker-compose or K8s secret
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:localredistoken}

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Mail — env var injected by docker-compose or K8s secret (SES in prod)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:false}
