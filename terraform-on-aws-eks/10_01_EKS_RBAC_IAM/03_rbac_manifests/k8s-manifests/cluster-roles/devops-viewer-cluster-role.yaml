# Bob + Frank — cluster-wide, logs yes, exec NO, rollout restart allowed
# Bound to group: eks-devops (see cluster-role-bindings/)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-viewer-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "configmaps", "namespaces", "nodes", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "patch"]
  # patch on deployments = kubectl rollout restart allowed
# pods/exec NOT listed — no exec
# secrets NOT listed — no access
