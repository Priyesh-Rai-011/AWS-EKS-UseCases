apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-dev-rb
  namespace: backend-prod       # scoped — Eve reads backend-prod to check API health
subjects:
- kind: Group
  name: eks-frontend-devs       # must match kubernetes_groups in access_entries.tf
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: frontend-dev-role
  apiGroup: rbac.authorization.k8s.io
