apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-dev-rb
  namespace: frontend-prod      # scoped — only covers frontend-prod
subjects:
- kind: Group
  name: eks-frontend-devs       # must match kubernetes_groups in access_entries.tf
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: frontend-dev-role
  apiGroup: rbac.authorization.k8s.io
