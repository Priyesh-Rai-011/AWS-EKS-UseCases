apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-admin-rb
  namespace: backend-prod       # scoped — only covers backend-prod
subjects:
- kind: Group
  name: eks-backend-admins      # must match kubernetes_groups in access_entries.tf
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: backend-admin-role
  apiGroup: rbac.authorization.k8s.io
