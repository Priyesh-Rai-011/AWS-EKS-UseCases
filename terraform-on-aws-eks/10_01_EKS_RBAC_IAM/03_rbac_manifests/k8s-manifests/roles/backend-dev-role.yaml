# Dave — backend-prod namespace only, logs yes, exec NO, rollout restart allowed
# Bound to group: eks-backend-devs (see role-bindings/)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-dev-role
  namespace: backend-prod
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "patch"]
  # patch = kubectl rollout restart deployment/<name> -n backend-prod
# pods/exec NOT listed — no exec
# secrets NOT listed — no access
# frontend-prod → DENIED (Role scoped to backend-prod only)
