# Charlie — backend-prod namespace only, exec allowed, full CRUD
# Bound to group: eks-backend-admins (see role-bindings/)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-admin-role
  namespace: backend-prod
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# secrets NOT listed — no access even in their own namespace
# kubectl get pods -n frontend-prod → DENIED (this Role only covers backend-prod)
