# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── Database (Postgres / EBS in EKS) ─────────────────────
# Local:  set via docker-compose environment
# EKS:    set via Kubernetes Secret
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/teamboard}
spring.datasource.username=${DB_USERNAME:teamboard}
spring.datasource.password=${DB_PASSWORD:teamboard}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Spring Session JDBC ──────────────────────────────────
# Sessions stored in Postgres so all replicas share login state.
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=30m

# ─── EFS Mount Path ───────────────────────────────────────
# Local:  ./data bind-mounted to /mnt/efs  (see docker-compose.yml)
# EKS:    EFS PVC mounted at /mnt/efs
efs.mount.path=${EFS_MOUNT_PATH:/mnt/efs}

# ─── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Thymeleaf ────────────────────────────────────────────
spring.thymeleaf.cache=false
