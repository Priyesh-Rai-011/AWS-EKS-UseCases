services:

  postgres:
    image: postgres:15
    container_name: pulseauth-postgres
    environment:
      POSTGRES_DB: pulseauth
      POSTGRES_USER: pulseadmin
      POSTGRES_PASSWORD: localpassword
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseadmin -d pulseauth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: pulseauth-redis
    command: redis-server --requirepass localredistoken
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "localredistoken", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pulseauth-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: ./app/pulseauth
    container_name: pulseauth-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pulseauth
      DB_USER: pulseadmin
      DB_PASSWORD: localpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: localredistoken
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_TLS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres-data:
