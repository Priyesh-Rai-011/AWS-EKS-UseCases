# ESO fetches DB credentials from Secrets Manager and materializes them as
# k8s Secret "pulseauth-db-secret". Postgres StatefulSet and PulseAuth app
# reference this secret by name.
#
# Seed the AWS secret before deploying (run once):
#   aws secretsmanager create-secret \
#     --name eks-secrets-dev/pulseauth/postgres \
#     --region ap-south-1 \
#     --secret-string '{
#       "DB_HOST":     "postgres-svc",
#       "DB_PORT":     "5432",
#       "DB_NAME":     "pulseauth",
#       "DB_USER":     "pulseadmin",
#       "DB_PASSWORD": "<your-strong-password>"
#     }'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pulseauth-db-external-secret
  namespace: pulseauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: pulseauth-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: eks-secrets-dev/pulseauth/postgres
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: eks-secrets-dev/pulseauth/postgres
        property: DB_PORT
    - secretKey: DB_NAME
      remoteRef:
        key: eks-secrets-dev/pulseauth/postgres
        property: DB_NAME
    - secretKey: DB_USER
      remoteRef:
        key: eks-secrets-dev/pulseauth/postgres
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: eks-secrets-dev/pulseauth/postgres
        property: DB_PASSWORD
