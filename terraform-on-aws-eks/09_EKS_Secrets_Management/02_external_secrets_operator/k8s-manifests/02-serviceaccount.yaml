# ESO ServiceAccount is NOT applied from this file.
# ESO creates its own ServiceAccount during Helm install.
# Annotate it with the IAM role ARN at install time via Helm values:
#
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace \
#     --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=<ESO_ROLE_ARN>
#
# Replace <ESO_ROLE_ARN> with the value from:
#   terraform output -module=eso_iam eso_role_arn
#   (or from the root stack: terraform output eso_role_arn)
#
# Applying a duplicate SA manifest after Helm install will cause conflicts.
# Do NOT kubectl apply this file.
