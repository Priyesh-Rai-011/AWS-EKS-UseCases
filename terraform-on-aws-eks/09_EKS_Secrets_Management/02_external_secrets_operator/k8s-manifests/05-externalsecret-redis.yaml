# ESO fetches Redis credentials from Secrets Manager → k8s Secret "pulseauth-redis-secret"
#
# Seed the AWS secret before deploying (run once):
#   aws secretsmanager create-secret \
#     --name eks-secrets-dev/pulseauth/redis \
#     --region ap-south-1 \
#     --secret-string '{
#       "REDIS_HOST":     "redis-svc",
#       "REDIS_PORT":     "6379",
#       "REDIS_PASSWORD": "<your-redis-password>"
#     }'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pulseauth-redis-external-secret
  namespace: pulseauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: pulseauth-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: eks-secrets-dev/pulseauth/redis
        property: REDIS_HOST
    - secretKey: REDIS_PORT
      remoteRef:
        key: eks-secrets-dev/pulseauth/redis
        property: REDIS_PORT
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: eks-secrets-dev/pulseauth/redis
        property: REDIS_PASSWORD
