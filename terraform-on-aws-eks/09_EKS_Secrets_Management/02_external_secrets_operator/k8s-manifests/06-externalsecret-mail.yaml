# ESO fetches mail credentials from Secrets Manager → k8s Secret "pulseauth-mail-secret"
#
# Seed the AWS secret before deploying (run once):
#   aws secretsmanager create-secret \
#     --name eks-secrets-dev/pulseauth/mail \
#     --region ap-south-1 \
#     --secret-string '{
#       "MAIL_HOST":     "<smtp-host>",
#       "MAIL_PORT":     "587",
#       "MAIL_USER":     "<user>",
#       "MAIL_PASSWORD": "<password>",
#       "MAIL_SMTP_AUTH": "true",
#       "MAIL_SMTP_TLS": "true"
#     }'
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pulseauth-mail-external-secret
  namespace: pulseauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: pulseauth-mail-secret
    creationPolicy: Owner
  data:
    - secretKey: MAIL_HOST
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_HOST
    - secretKey: MAIL_PORT
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_PORT
    - secretKey: MAIL_USER
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_USER
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_PASSWORD
    - secretKey: MAIL_SMTP_AUTH
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_SMTP_AUTH
    - secretKey: MAIL_SMTP_TLS
      remoteRef:
        key: eks-secrets-dev/pulseauth/mail
        property: MAIL_SMTP_TLS
