# ClusterIP service — internal-only access for PulseAuth app to reach Redis
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: pulseauth
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
