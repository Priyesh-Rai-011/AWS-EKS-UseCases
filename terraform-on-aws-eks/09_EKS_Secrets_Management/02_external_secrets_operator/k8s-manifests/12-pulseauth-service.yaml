# Internet-facing LoadBalancer — routes external traffic to PulseAuth pods
apiVersion: v1
kind: Service
metadata:
  name: pulseauth-svc
  namespace: pulseauth
  labels:
    app: pulseauth
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: pulseauth
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
