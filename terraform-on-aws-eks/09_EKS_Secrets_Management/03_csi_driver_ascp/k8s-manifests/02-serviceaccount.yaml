# ServiceAccount for PulseAuth pods.
# IRSA: annotation tells the CSI Secrets Store driver which IAM role to assume
# when fetching secrets from AWS Secrets Manager via ASCP.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulseauth
  namespace: pulseauth
  labels:
    app: pulseauth
  annotations:
    eks.amazonaws.com/role-arn: <ASCP_ROLE_ARN_PLACEHOLDER>
