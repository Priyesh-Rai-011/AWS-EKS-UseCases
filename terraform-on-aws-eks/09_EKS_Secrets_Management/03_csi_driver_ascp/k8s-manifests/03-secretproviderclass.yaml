# SecretProviderClass — tells CSI Secrets Store driver how to fetch secrets from AWS.
# The volume mount triggers ASCP to call Secrets Manager, and secretObjects syncs
# the fetched values into a k8s Secret for envFrom usage.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pulseauth-secrets-provider
  namespace: pulseauth
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "eks-secrets-dev/pulseauth/all"
        objectType: "secretsmanager"
        region: "ap-south-1"
        jmesPath:
          - path: DB_HOST
            objectAlias: db-host
          - path: DB_PORT
            objectAlias: db-port
          - path: DB_NAME
            objectAlias: db-name
          - path: DB_USER
            objectAlias: db-user
          - path: DB_PASSWORD
            objectAlias: db-password
          - path: REDIS_HOST
            objectAlias: redis-host
          - path: REDIS_PORT
            objectAlias: redis-port
          - path: REDIS_PASSWORD
            objectAlias: redis-password
          - path: MAIL_HOST
            objectAlias: mail-host
          - path: MAIL_PORT
            objectAlias: mail-port
          - path: MAIL_USER
            objectAlias: mail-user
          - path: MAIL_PASSWORD
            objectAlias: mail-password
          - path: MAIL_SMTP_AUTH
            objectAlias: mail-smtp-auth
          - path: MAIL_SMTP_TLS
            objectAlias: mail-smtp-tls
  secretObjects:
    - secretName: pulseauth-secrets
      type: Opaque
      data:
        - objectName: db-host
          key: DB_HOST
        - objectName: db-port
          key: DB_PORT
        - objectName: db-name
          key: DB_NAME
        - objectName: db-user
          key: DB_USER
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: redis-host
          key: REDIS_HOST
        - objectName: redis-port
          key: REDIS_PORT
        - objectName: redis-password
          key: REDIS_PASSWORD
        - objectName: mail-host
          key: MAIL_HOST
        - objectName: mail-port
          key: MAIL_PORT
        - objectName: mail-user
          key: MAIL_USER
        - objectName: mail-password
          key: MAIL_PASSWORD
        - objectName: mail-smtp-auth
          key: MAIL_SMTP_AUTH
        - objectName: mail-smtp-tls
          key: MAIL_SMTP_TLS
